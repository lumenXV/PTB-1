name: Verify

on:
  push:
  pull_request:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run stability tests
        run: python -m unittest discover

      - name: Run one dataset
        run: python -m ptb1 --data datasets/sample_prices.csv

      - name: Run all datasets
        run: python -m ptb1 --all-datasets
